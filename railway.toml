[build]
builder = "nixpacks"
buildCommand = "cd vendedor && pip install -r requirements.txt"

[deploy]
startCommand = "sh -c 'cd vendedor && python -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --worker-class gthread --timeout 120 --access-logfile - --error-logfile -'"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyMaxRetries = 5
numReplicas = 1
